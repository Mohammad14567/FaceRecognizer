<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مطعم ومقهى موريا</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
    }
    #app { width: 100vw; height: 100vh; position: relative; }

    #cam-wrap {
      position: absolute; inset: 0;
      background: #000;
      overflow: hidden;
    }
    #cam-wrap video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #overlay {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 2;
    }
    #flash {
      position: absolute; inset: 0;
      background: #fff; opacity: 0;
      z-index: 10; pointer-events: none;
      transition: opacity 0.05s;
    }
    #countdown-badge {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 120px; color: #fff;
      text-shadow: 0 4px 24px rgba(0,0,0,0.7);
      z-index: 8; display: none;
      pointer-events: none; line-height: 1;
    }
    #status-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
      padding: 3rem 1.5rem 1.5rem; z-index: 5;
      pointer-events: none;
    }
    #status-text {
      font-size: 15px; color: #fff; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555; flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.ready  { background: #4ade80; }
    #status-dot.gesture { background: #f59e0b; animation: pulse-dot 0.6s infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

    #cam-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; z-index: 1;
    }
    #cam-placeholder svg { opacity: 0.3; }
    #cam-placeholder p { font-size: 14px; color: #666; }

    #no-mediapipe {
      display: none;
      margin-top: 1rem;
      padding: 1rem;
      background: #1e1a0e;
      border: 1px solid #78350f;
      border-radius: 8px;
      color: #fbbf24;
      font-size: 13px;
    }

    #photo-result {
      display: none;
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%);
      gap: 10px; z-index: 20;
      direction: ltr;
    }
    #photo-result.show { display: flex; }
    .photo-item {
      width: 60px; height: 60px;
      border-radius: 10px; overflow: hidden;
      border: 2px solid rgba(255,255,255,0.3);
      flex-shrink: 0;
    }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* === Gesture Carousel (top-middle) === */
    #gesture-guide {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 20; pointer-events: none;
      display: flex; flex-direction: column; align-items: center;
      width: auto; max-width: 90vw;
    }
    .g-card {
      pointer-events: auto; cursor: pointer;
      background: rgba(20,20,20,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px 36px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      transition: opacity 0.5s ease, transform 0.5s ease;
      text-align: center;
      user-select: none;
    }
    .g-card .g-icon { font-size: 48px; line-height: 1.2; }
    .g-card .g-name { font-size: 18px; font-weight: 500; color: #fff; margin-top: 4px; }
    .g-card .g-desc { font-size: 13px; color: #aaa; }
    .g-card.active { border-color: #8b5cf6; box-shadow: 0 0 20px rgba(139,92,246,0.15); }
    .g-card.hidden { opacity: 0; transform: scale(0.9); pointer-events: none; position: absolute; }

    /* === Dots indicator === */
    #g-dots {
      pointer-events: auto;
      display: flex; gap: 6px; margin-top: 10px;
    }
    #g-dots .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      cursor: pointer; transition: background 0.3s;
    }
    #g-dots .dot.active { background: #8b5cf6; }

    /* === QR Modal === */
    #qr-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 100;
      align-items: center; justify-content: center;
      padding: 1rem; text-align: center;
    }
    #qr-modal-overlay.show { display: flex; }
    #qr-modal {
      background: #141414; border: 1px solid #2a2a2a;
      border-radius: 16px; padding: 1.5rem;
      width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    #qr-modal h2 { font-size: 20px; font-weight: 500; color: #eee; margin-bottom: 0.5rem; }
    #qr-modal p { font-size: 13px; color: #777; margin-bottom: 1.25rem; }
    #qr-code-wrap { display: flex; justify-content: center; margin-bottom: 1.25rem; }
    #qr-code-wrap img, #qr-code-wrap canvas {
      border-radius: 12px; border: 3px solid #2a2a2a;
    }
    #qr-modal .photo-count { font-size: 12px; color: #555; margin-bottom: 0.25rem; }
    #btn-close-qr {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      padding: 12px 22px;
      border-radius: 8px; border: 1px solid #8b5cf6;
      background: transparent; color: #a78bfa;
      cursor: pointer;
      width: 100%; justify-content: center;
    }
    #btn-close-qr:hover { background: #1e122e; }

  </style>
</head>
<body>
<div id="app">

  <div id="cam-wrap">
    <div id="cam-placeholder">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <p>Requesting camera access...</p>
    </div>
    <video id="video" autoplay muted playsinline webkit-playsinline></video>
    <canvas id="overlay"></canvas>
    <div id="flash"></div>
    <div id="countdown-badge" aria-live="assertive"></div>
    <div id="status-bar">
      <div id="status-text">
        <div id="status-dot"></div>
        <span id="status-msg">Camera off</span>
      </div>
    </div>
  </div>

  <div id="gesture-guide">
    <div class="g-card active" data-idx="0" onclick="selectGesture(0)">
      <span class="g-icon">🖐</span>
      <div class="g-name">كف مفتوح</div>
      <div class="g-desc">عد ٣ ثواني → تصوير</div>
    </div>
    <div class="g-card hidden" data-idx="1" onclick="selectGesture(1)">
      <span class="g-icon">✌️</span>
      <div class="g-name">سلام</div>
      <div class="g-desc">تصوير فوري</div>
    </div>
    <div class="g-card hidden" data-idx="2" onclick="selectGesture(2)">
      <span class="g-icon">👊</span>
      <div class="g-name">قبضة</div>
      <div class="g-desc">إلغاء</div>
    </div>
    <div class="g-card hidden" data-idx="3" onclick="selectGesture(3)">
      <span class="g-icon">☝️</span>
      <div class="g-name">إصبع واحد</div>
      <div class="g-desc">إنشاء QR لتحميل الصور</div>
    </div>
    <div id="g-dots">
      <div class="dot active" onclick="selectGesture(0)"></div>
      <div class="dot" onclick="selectGesture(1)"></div>
      <div class="dot" onclick="selectGesture(2)"></div>
      <div class="dot" onclick="selectGesture(3)"></div>
    </div>
  </div>

  <div id="photo-result"></div>

  <div id="no-mediapipe">
    MediaPipe failed to load. Please check your internet connection and reload the page.
  </div>

  <div id="qr-modal-overlay">
    <div id="qr-modal">
      <h2>📸 مسح QR لتحميل الصور</h2>
      <p>امسح رمز QR بهاتفك لتحميل جميع الصور</p>
      <div id="qr-code-wrap"></div>
      <div class="photo-count" id="qr-photo-count"></div>
      <button id="btn-close-qr" onclick="closeQRModal()">إغلاق</button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-5niY7cY6Dw/F7eYc2dcFqd8WDuhQXmBwY8IsYOdgIF7V/P/Y0b+1lzqIYaErwLxaG6xE1BF96vy66pSl7r5LJQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
const video      = document.getElementById('video');
const overlay    = document.getElementById('overlay');
const flash      = document.getElementById('flash');
const cdBadge    = document.getElementById('countdown-badge');
const statusDot  = document.getElementById('status-dot');
const statusMsg  = document.getElementById('status-msg');
const photoResult = document.getElementById('photo-result');
const placeholder = document.getElementById('cam-placeholder');

let ctx, handsModel, mpCam;
let countingDown = false, snapped = false;
let gestureHoldFrames = 0;
const HOLD_FRAMES = 18;
let lastGesture = null;
const photos = [];

let gestureIdx = 0;
let gestureTimer = null;
let gesturePause = false;

const GESTURES = [
  { icon: '🖐', name: 'كف مفتوح', desc: 'عد ٣ ثواني → تصوير' },
  { icon: '✌️', name: 'سلام', desc: 'تصوير فوري' },
  { icon: '👊', name: 'قبضة', desc: 'إلغاء' },
  { icon: '☝️', name: 'إصبع واحد', desc: 'إنشاء QR لتحميل الصور' }
];

function showGesture(i) {
  const cards = document.querySelectorAll('.g-card');
  const dots = document.querySelectorAll('.dot');
  cards.forEach((c, idx) => {
    c.classList.toggle('active', idx === i);
    c.classList.toggle('hidden', idx !== i);
  });
  dots.forEach((d, idx) => d.classList.toggle('active', idx === i));
  gestureIdx = i;
}

function startGestureAuto() {
  stopGestureAuto();
  gestureTimer = setInterval(() => {
    if (gesturePause) return;
    showGesture((gestureIdx + 1) % GESTURES.length);
  }, 3000);
}

function stopGestureAuto() {
  if (gestureTimer) { clearInterval(gestureTimer); gestureTimer = null; }
}

function selectGesture(i) {
  showGesture(i);
  gesturePause = true;
  stopGestureAuto();
  setTimeout(() => {
    gesturePause = false;
    if (!gestureTimer) startGestureAuto();
  }, 10000);
}

function setStatus(msg, state) {
  statusMsg.textContent = msg;
  statusDot.className = '';
  if (state) statusDot.classList.add(state);
}

function classifyGesture(lm) {
  if (!lm || lm.length < 21) return 'none';
  const tips = [4, 8, 12, 16, 20];
  const mids = [3, 6, 10, 14, 18];
  const extended = tips.map((t, i) => {
    if (i === 0) return lm[t].x < lm[mids[i]].x;
    return lm[t].y < lm[mids[i]].y;
  });
  const fingerCount = extended.slice(1).filter(Boolean).length;
  const thumbOut = extended[0];
  if (fingerCount === 4 && thumbOut) return 'open';
  if (fingerCount === 2 && extended[1] && extended[2] && !extended[3] && !extended[4]) return 'peace';
  if (fingerCount === 1 && extended[1]) return 'one';
  if (fingerCount === 0) return 'fist';
  return 'none';
}

function drawLandmarks(lm) {
  if (!ctx || !lm) return;
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  const w = overlay.width, h = overlay.height;
  const connections = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [5,9],[9,10],[10,11],[11,12],
    [9,13],[13,14],[14,15],[15,16],
    [13,17],[17,18],[18,19],[19,20],[0,17]
  ];
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  for (const [a, b] of connections) {
    ctx.beginPath();
    ctx.moveTo((1 - lm[a].x) * w, lm[a].y * h);
    ctx.lineTo((1 - lm[b].x) * w, lm[b].y * h);
    ctx.stroke();
  }
  for (const p of lm) {
    ctx.beginPath();
    ctx.arc((1 - p.x) * w, p.y * h, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(245,158,11,0.9)';
    ctx.fill();
  }
}

function triggerCountdown(seconds, onDone) {
  if (countingDown) return;
  countingDown = true;
  cdBadge.style.display = 'block';
  let s = seconds;
  const tick = () => {
    if (s <= 0) {
      cdBadge.style.display = 'none';
      countingDown = false;
      onDone();
      return;
    }
    cdBadge.textContent = s;
    s--;
    setTimeout(tick, 900);
  };
  tick();
}

function capturePhoto() {
  snapped = true;
  flash.style.opacity = 1;
  setTimeout(() => { flash.style.opacity = 0; }, 140);

  const snap = document.createElement('canvas');
  snap.width  = video.videoWidth  || 1280;
  snap.height = video.videoHeight || 720;
  const sc = snap.getContext('2d');
  sc.save();
  sc.translate(snap.width, 0);
  sc.scale(-1, 1);
  sc.drawImage(video, 0, 0);
  sc.restore();

  const dataURL = snap.toDataURL('image/jpeg', 0.95);
  photos.push(dataURL);

  const item = document.createElement('div');
  item.className = 'photo-item';
  const img = document.createElement('img');
  img.src = dataURL;
  img.alt = 'صورة ' + photos.length;
  item.appendChild(img);
  photoResult.appendChild(item);
  photoResult.classList.add('show');

  setStatus('تم حفظ الصورة! (' + photos.length + ' إجمالي)', 'ready');
  if (ctx) ctx.clearRect(0, 0, overlay.width, overlay.height);
  setTimeout(() => { snapped = false; }, 800);
}

function clearPhotos() {
  photos.length = 0;
  photoResult.innerHTML = '';
  photoResult.classList.remove('show');
  setStatus('تم مسح كل الصور', 'ready');
}

function restartApp() {
  clearPhotos();
  countingDown = false;
  snapped = false;
  gestureHoldFrames = 0;
  lastGesture = null;
  cdBadge.style.display = 'none';
  if (ctx) ctx.clearRect(0, 0, overlay.width, overlay.height);
  setStatus('تم إعادة التعيين!', 'ready');
}

function closeQRModal() {
  document.getElementById('qr-modal-overlay').classList.remove('show');
  setStatus('اعرض إيماءة لالتقاط صورة', 'ready');
}



function dataURLtoBlob(d) {
  const p = d.split(','), m = p[0].match(/:(.*?);/)[1], b = atob(p[1]);
  const a = new Uint8Array(b.length);
  for (let i = 0; i < b.length; i++) a[i] = b.charCodeAt(i);
  return new Blob([a], { type: m });
}

async function uploadToTelegraph(dataUrl) {
  const fd = new FormData();
  fd.append('file', dataURLtoBlob(dataUrl), 'photo_' + Date.now() + '.jpg');
  const r = await fetch('https://telegra.ph/upload', { method: 'POST', body: fd });
  const d = await r.json();
  if (!d || !d[0] || !d[0].src) throw new Error('فشل رفع الصورة');
  return 'https://telegra.ph' + d[0].src;
}

async function generateQRCode() {
  if (photos.length === 0) {
    setStatus('⚠️ التقط الصور أولاً', 'ready');
    return;
  }
  
  if (typeof QRCode === 'undefined') {
    setStatus('❌ مكتبة QR لم يتم تحميلها، أعد تحميل الصفحة', 'ready');
    return;
  }
  
  setStatus('📸 جاري رفع الصور...', 'gesture');
  
  try {
    const urls = [];
    for (let i = 0; i < photos.length; i++) {
      setStatus('📸 رفع الصورة ' + (i + 1) + '/' + photos.length + '...', 'gesture');
      urls.push(await uploadToTelegraph(photos[i]));
    }
    const galleryPage = await createTelegraphGallery(urls);
    showQRCard(galleryPage, urls.length);
  } catch (e) {
    setStatus('❌ ' + e.message, 'ready');
  }
}

async function createTelegraphGallery(imgUrls) {
  let token = localStorage.getItem('tg_token');
  if (!token) {
    const a = await (await fetch('https://api.telegra.ph/createAccount', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ short_name: 'Moria', author_name: 'مطعم ومقهى موريا' })
    })).json();
    if (!a.ok) throw new Error('فشل إنشاء الحساب');
    token = a.result.access_token;
    localStorage.setItem('tg_token', token);
  }
  const content = imgUrls.map(u => ({ tag: 'img', attrs: { src: u } }));
  content.push({ tag: 'p', children: ['📸 مطعم ومقهى موريا'] });
  const p = await (await fetch('https://api.telegra.ph/createPage', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      access_token: token, title: 'صور من مطعم ومقهى موريا',
      author_name: 'مطعم ومقهى موريا', content: content
    })
  })).json();
  if (!p.ok) throw new Error('فشل إنشاء صفحة المعرض');
  return 'https://telegra.ph/' + p.result.path;
}

function showQRCard(url, count) {
  const wrap = document.getElementById('qr-code-wrap');
  wrap.innerHTML = '';
  new QRCode(wrap, {
    text: url, width: 240, height: 240,
    colorDark: '#ffffff', colorLight: '#141414',
    correctLevel: QRCode.CorrectLevel.M
  });
  document.getElementById('qr-photo-count').textContent = count + ' صورة — امسح QR بهاتفك';
  document.getElementById('qr-modal-overlay').classList.add('show');
  setStatus('✅ QR جاهز! امسحه لفتح المعرض', 'ready');
}

function onResults(results) {
  if (snapped || countingDown) return;
  overlay.width  = video.videoWidth  || 640;
  overlay.height = video.videoHeight || 360;
  const lm = results.multiHandLandmarks?.[0];
  if (lm) {
    drawLandmarks(lm);
    const g = classifyGesture(lm);
    if (g !== 'none') {
      if (g === lastGesture) gestureHoldFrames++;
      else { gestureHoldFrames = 0; lastGesture = g; }
      if (gestureHoldFrames >= HOLD_FRAMES) {
        gestureHoldFrames = 0;
        if (g === 'open') {
          setStatus('🖐 كف مفتوح! بدء العد التنازلي...', 'gesture');
          triggerCountdown(3, capturePhoto);
        } else if (g === 'peace') {
          setStatus('✌️ سلام! تصوير الآن...', 'gesture');
          capturePhoto();
        } else if (g === 'fist') {
          setStatus('اعرض إيماءة لالتقاط صورة', 'ready');
        } else if (g === 'one') {
          setStatus('☝️ إنشاء رمز QR...', 'gesture');
          generateQRCode();
        }
      } else {
        const names = {
          open: '🖐 أمسك الكف ثابتاً...',
          peace: '✌️ أمسك السلام ثابتاً...',
          fist: '👊 قبضة — إلغاء',
          one: '☝️ أمسك الإصبع ثابتاً...'
        };
        setStatus(names[g] || 'تم اكتشاف إيماءة...', 'gesture');
      }
    } else {
      lastGesture = null;
      gestureHoldFrames = 0;
      setStatus('اعرض إيماءة لالتقاط صورة', 'ready');
    }
  } else {
    if (ctx) ctx.clearRect(0, 0, overlay.width, overlay.height);
    lastGesture = null;
    gestureHoldFrames = 0;
    setStatus('لم يتم اكتشاف يد — اعرض يدك للكاميرا', 'ready');
  }
}

async function startCam() {
  setStatus('جارٍ تشغيل الكاميرا...', '');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    video.play();
    placeholder.style.display = 'none';
    ctx = overlay.getContext('2d');

    if (typeof Hands === 'undefined') {
      document.getElementById('no-mediapipe').style.display = '';
      return;
    }

    handsModel = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    handsModel.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.6
    });
    handsModel.onResults(onResults);

    mpCam = new Camera(video, {
      onFrame: async () => { await handsModel.send({ image: video }); },
      width: 1280,
      height: 720
    });
    mpCam.start();

    setStatus('اعرض إيماءة لالتقاط صورة', 'ready');
  } catch (e) {
    setStatus('تم رفض الوصول إلى الكاميرا أو أنها غير متوفرة', '');
  }
}

window.addEventListener('load', () => {
  startCam();
  startGestureAuto();
});

</script>
</body>
</html>
