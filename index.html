<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📸 Moria Photo Booth</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.35);
    --purple: #a855f7;
    --purple-dim: rgba(168,85,247,0.12);
    --bg: #0d0d0d;
    --white: #ffffff;
    --green: #22c55e;
    --orange: #f97316;
    --red: #ef4444;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
  }

  /* ─── VIDEO ─── */
  #video {
    position: fixed;
    inset: 0;
    width: 100vw; height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
    z-index: 0;
  }

  /* ─── CANVAS ─── */
  #overlay {
    position: fixed;
    inset: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 1;
  }

  /* ─── FLASH ─── */
  #flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
    transition: opacity 80ms ease;
  }
  #flash.active { opacity: 1; }

  /* ─── GESTURE GUIDE ─── */
  #gesture-guide {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 8px;
    align-items: center;
    background: rgba(13,13,13,0.72);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 10px 14px;
  }


  .gesture-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 12px;
    border-radius: 14px;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s ease, opacity 0.4s ease;
    transform: scale(0.92);
    opacity: 0.75;
    min-width: 68px;
  }

  .gesture-item.active-hint {
    transform: scale(1.08);
    opacity: 1;
    box-shadow: 0 0 18px 4px rgba(255,255,255,0.18);
  }

  .gesture-icon {
    font-size: 26px;
    line-height: 1;
  }

  .gesture-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.7);
    text-align: center;
    white-space: nowrap;
  }

  /* ─── COUNTDOWN ─── */
  #countdown {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    width: 120px; height: 120px;
    display: none;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(13,13,13,0.85);
    border: 3px solid var(--amber);
    box-shadow: 0 0 40px rgba(251,191,36,0.4);
    font-size: 64px;
    font-weight: 700;
    color: var(--amber);
  }
  #countdown.visible { display: flex; }

  /* ─── STATUS BAR ─── */
  #status-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px 16px;
    background: linear-gradient(to top, rgba(13,13,13,0.9) 0%, transparent 100%);
  }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.gesture {
    background: var(--orange);
    box-shadow: 0 0 8px var(--orange);
    animation: pulse-dot 0.8s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.7); }
  }

  #status-text {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.06em;
    font-weight: 400;
  }

  /* ─── THUMBNAILS ─── */
  #thumbnails {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .thumb {
    width: 46px; height: 46px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.3);
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    transition: transform 0.2s;
  }
  .thumb:hover { transform: scale(1.15); }

  /* ─── PHOTO COUNT ─── */
  #photo-count {
    position: fixed;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(13,13,13,0.7);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    display: none;
  }

  /* ─── QR CARD ─── */
  #qr-card {
    position: fixed;
    inset: 0;
    z-index: 30;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(13,13,13,0.88);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
  }
  #qr-card.visible { display: flex; }

  .qr-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 28px;
    padding: 36px 40px;
    max-width: 320px;
    width: 90%;
  }

  .qr-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-align: center;
  }

  .qr-subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    text-align: center;
  }

  #qr-container {
    background: white;
    border-radius: 16px;
    padding: 14px;
    width: 200px; height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #qr-loading {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    text-align: center;
  }

  .qr-close-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    border-radius: 12px;
    padding: 10px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    pointer-events: all;
  }
  .qr-close-btn:hover { background: rgba(255,255,255,0.14); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 767px) {
    #gesture-guide { padding: 8px 10px; gap: 4px; }
    .gesture-item { padding: 6px 8px; min-width: 56px; }
    .gesture-icon { font-size: 20px; }
    .gesture-label { font-size: 9px; }

  }

  @media (min-width: 768px) and (max-width: 1024px) {
    .gesture-icon { font-size: 30px; }
  }

  @media (max-height: 500px) and (orientation: landscape) {
    #gesture-guide { top: 8px; padding: 6px 10px; }
    .gesture-item { padding: 4px 8px; }
    .gesture-icon { font-size: 18px; }
    #status-bar { padding: 8px 16px 10px; }
    .thumb { width: 36px; height: 36px; }
    #thumbnails { bottom: 40px; }
  }
</style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>
<canvas id="overlay"></canvas>
<div id="flash"></div>

<!-- Gesture Guide -->
<div id="gesture-guide">
  <div class="gesture-item" data-idx="0">
    <span class="gesture-icon">🖐</span>
    <span class="gesture-label">Palm → 3s</span>
  </div>
  <div class="gesture-item" data-idx="1">
    <span class="gesture-icon">✌️</span>
    <span class="gesture-label">فوري</span>
  </div>
  <div class="gesture-item" data-idx="2">
    <span class="gesture-icon">👊</span>
    <span class="gesture-label">إلغاء</span>
  </div>
  <div class="gesture-item" data-idx="3">
    <span class="gesture-icon">👍</span>
    <span class="gesture-label">QR كود</span>
  </div>
</div>


<!-- Countdown -->
<div id="countdown"></div>

<!-- Photo count -->
<div id="photo-count"></div>

<!-- Thumbnails -->
<div id="thumbnails"></div>

<!-- Status bar -->
<div id="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <div id="status-text">جاهز</div>
  <div style="width:10px"></div>
</div>

<!-- QR Card -->
<div id="qr-card">
  <div class="qr-inner">
    <div class="qr-title">📸 صورك جاهزة!</div>
    <div class="qr-subtitle">امسح رمز QR بهاتفك لفتح صفحة التحميل</div>
    <div id="qr-container">
      <div id="qr-loading">جارٍ الرفع...</div>
    </div>
    <button class="qr-close-btn" onclick="closeQR()">إغلاق</button>
  </div>
</div>

<script>
// ─── CLOUDINARY ──────────────────────────────────
const CLOUDINARY_CLOUD = 'drjpgwl15';
const CLOUDINARY_PRESET = 'moria_preset';

// ─── GALLERY MODE (when QR is scanned) ──────────
const galleryIds = new URLSearchParams(window.location.search).get('p');
if (galleryIds) {
  const ids = galleryIds.split(',');
  const CLOUD = CLOUDINARY_CLOUD;
  const FILTERS = [
    { name: 'أصلي', css: 'none' },
    { name: 'كلارندون', css: 'brightness(1.12) contrast(1.15) saturate(1.25)' },
    { name: 'جونو', css: 'brightness(1.05) contrast(1.12) saturate(1.35) hue-rotate(-5deg)' },
    { name: 'لارك', css: 'brightness(1.08) contrast(0.88) saturate(0.82) sepia(0.06)' },
    { name: 'غينغهام', css: 'brightness(1.02) contrast(0.95) saturate(0.78) sepia(0.08)' },
    { name: 'فالنسيا', css: 'brightness(1.1) contrast(0.92) saturate(1.08) sepia(0.1)' },
    { name: 'إكس-برو', css: 'brightness(1.05) contrast(1.25) saturate(1.35) sepia(0.18)' },
    { name: 'سييرا', css: 'brightness(0.92) contrast(1.08) saturate(0.88) sepia(0.14)' },
    { name: 'ويلو', css: 'brightness(0.92) contrast(0.92) saturate(0.55) grayscale(1)' },
    { name: '1977', css: 'brightness(1.1) contrast(1.05) saturate(0.65) sepia(0.35) hue-rotate(-10deg)' },
  ];

  window.gIds = ids;
  window.gCloud = CLOUD;
  window.gFilters = FILTERS;
  window.gFilterState = new Array(ids.length).fill(0);

  window.closePanel = function () {
    var el = document.getElementById('filter-overlay');
    if (el) el.style.display = 'none';
  };

  window.applyFilter = function (imgIdx, filterIdx) {
    gFilterState[imgIdx] = filterIdx;
    var img = document.querySelector('.photo-card[data-idx="' + imgIdx + '"] .photo-img');
    if (img) img.style.filter = gFilters[filterIdx].css;
    closePanel();
  };

  window.openPanel = function (imgIdx) {
    var overlay = document.getElementById('filter-overlay');
    var container = document.getElementById('filter-thumbnails');
    if (!overlay || !container) return;
    container.innerHTML = gFilters.map(function (f, fi) {
      return '<div class="filter-thumb" onclick="applyFilter(' + imgIdx + ',' + fi + ')">' +
        '<img src="https://res.cloudinary.com/' + gCloud + '/image/upload/w_72,h_72,c_fill/' + gIds[imgIdx] + '" style="filter:' + f.css + ';width:72px;height:72px;object-fit:cover;border-radius:8px;display:block" crossorigin="anonymous">' +
        '<span style="font-size:10px;color:rgba(255,255,255,0.6);margin-top:4px;display:block;text-align:center">' + f.name + '</span>' +
        '</div>';
    }).join('');
    overlay.style.display = 'flex';
  };

  window.downloadOne = function (idx, cb) {
    cb = cb || function () {};
    var f = gFilters[gFilterState[idx]];
    var imgUrl = 'https://res.cloudinary.com/' + gCloud + '/image/upload/' + gIds[idx];
    function trigger(url) {
      var a = document.createElement('a');
      a.href = url;
      a.download = 'moria-' + (idx + 1) + '.jpg';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(cb, 600);
    }
    if (f.css === 'none') {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', imgUrl, true);
      xhr.responseType = 'blob';
      xhr.onload = function () {
        var url = URL.createObjectURL(xhr.response);
        trigger(url);
        setTimeout(function () { URL.revokeObjectURL(url); }, 10000);
      };
      xhr.onerror = function () { fallbackCanvas(null); };
      xhr.send();
    } else {
      fallbackCanvas(f.css);
    }
    function fallbackCanvas(filterCss) {
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function () {
        var c = document.createElement('canvas');
        c.width = img.naturalWidth;
        c.height = img.naturalHeight;
        var ctx = c.getContext('2d');
        if (filterCss) ctx.filter = filterCss;
        ctx.drawImage(img, 0, 0);
        c.toBlob(function (blob) {
          var url = URL.createObjectURL(blob);
          trigger(url);
          setTimeout(function () { URL.revokeObjectURL(url); }, 10000);
        }, 'image/jpeg', 0.95);
      };
      img.src = imgUrl;
    }
  };

  window.downloadAll = function () {
    var i = 0;
    function next() {
      if (i >= gIds.length) return;
      var btn = document.getElementById('dl-all');
      btn.disabled = true;
      btn.textContent = '⬇⬇ جاري التحميل... (' + (i + 1) + '/' + gIds.length + ')';
      downloadOne(i, function () {
        i++;
        btn.textContent = '⬇⬇ جاري التحميل... (' + (Math.min(i + 1, gIds.length)) + '/' + gIds.length + ')';
        if (i < gIds.length) {
          setTimeout(next, 400);
        } else {
          btn.textContent = '⬇⬇ تم التحميل ✓';
          setTimeout(function () { btn.disabled = false; btn.textContent = '⬇⬇ تحميل الكل'; }, 3000);
        }
      });
    }
    next();
  };

  var imgs = ids.map(function (id, i) {
    return '<div class="photo-card" data-idx="' + i + '">' +
      '<div class="card-actions"><button class="filter-btn" onclick="openPanel(' + i + ')">🎨</button></div>' +
      '<img class="photo-img" src="https://res.cloudinary.com/' + CLOUD + '/image/upload/' + id + '" crossorigin="anonymous">' +
      '<br><button class="dl-btn" onclick="downloadOne(' + i + ')">⬇ تحميل ' + (i + 1) + '</button>' +
      '</div>';
  }).join('\n');

  document.body.innerHTML =
    '<style>' +
    'html{overflow:auto;height:auto}' +
    'body{margin:0;padding:20px;font-family:sans-serif;background:#111;color:#fff;direction:rtl}' +
    'h1{text-align:center;color:#fbbf24;font-size:22px;margin-bottom:24px}' +
    '#dl-all{display:block;width:fit-content;margin:0 auto 20px;background:#22c55e;color:#000;border:none;padding:14px 32px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}' +
    '.photo-card{position:relative;margin-bottom:20px;text-align:center}' +
    '.card-actions{position:absolute;top:8px;right:8px;z-index:2}' +
    '.filter-btn{background:rgba(0,0,0,0.5);border:none;border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '.photo-img{max-width:100%;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}' +
    '.dl-btn{display:inline-block;background:#fbbf24;color:#000;border:none;padding:10px 24px;border-radius:10px;text-decoration:none;font-weight:600;margin-top:8px;cursor:pointer;font-size:14px}' +
    '#filter-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:flex-end;justify-content:center;padding:20px}' +
    '#filter-panel{background:#1a1a1a;border-radius:16px 16px 0 0;padding:20px 12px;max-width:500px;width:100%}' +
    '#filter-panel h3{text-align:center;margin:0 0 14px;font-size:14px;color:rgba(255,255,255,0.5)}' +
    '#filter-thumbnails{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}' +
    '.filter-thumb{flex-shrink:0;width:72px;cursor:pointer;text-align:center}' +
    '.filter-thumb img{outline:2px solid transparent;outline-offset:2px;border-radius:8px}' +
    '.footer{text-align:center;color:rgba(255,255,255,0.3);font-size:12px;margin-top:30px}' +
    '</style>' +
    '<h1>📸 صورك من موريا</h1>' +
    '<button id="dl-all" onclick="downloadAll()">⬇⬇ تحميل الكل</button>' +
    imgs +
    '<div id="filter-overlay" onclick="closePanel()">' +
    '<div id="filter-panel" onclick="event.stopPropagation()">' +
    '<h3>اختر فلتر</h3>' +
    '<div id="filter-thumbnails"></div>' +
    '</div>' +
    '</div>' +
    '<p class="footer">مطعم ومقهى موريا</p>';

  throw new Error('gallery');
}

// ─── STATE ───────────────────────────────────────
const photos = [];
let gestureHoldCount = 0;
let lastGesture = null;
let countdownInterval = null;
let countdownValue = 3;
let pendingGesture = null;
let hintIndex = 0;
let isCapturing = false;
let qrVisible = false;

const HOLD_THRESHOLD = 18;

// DOM
const video    = document.getElementById('video');
const overlay  = document.getElementById('overlay');
const ctx      = overlay.getContext('2d');
const flash    = document.getElementById('flash');
const cdEl     = document.getElementById('countdown');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const thumbsEl = document.getElementById('thumbnails');
const photoCount = document.getElementById('photo-count');
const qrCard   = document.getElementById('qr-card');
const qrContainer = document.getElementById('qr-container');
const qrLoading = document.getElementById('qr-loading');
const gestureItems = document.querySelectorAll('.gesture-item');

// ─── GESTURE HINT ROTATION ────────────────────────
function rotateHint() {
  gestureItems.forEach((el, i) => {
    el.classList.toggle('active-hint', i === hintIndex);
  });
  hintIndex = (hintIndex + 1) % gestureItems.length;
}
rotateHint();
setInterval(rotateHint, 4000);

// ─── CANVAS RESIZE ───────────────────────────────
function resizeCanvas() {
  overlay.width  = overlay.clientWidth;
  overlay.height = overlay.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── VIDEO RECT ──────────────────────────────────
function videoRect() {
  const vw = overlay.clientWidth;
  const vh = overlay.clientHeight;
  const videoAR = video.videoWidth / (video.videoHeight || 1);
  const canvasAR = vw / vh;
  let visibleW, visibleH, offsetX = 0, offsetY = 0;
  if (videoAR > canvasAR) {
    visibleH = vh;
    visibleW = vh * videoAR;
    offsetX = (vw - visibleW) / 2;
  } else {
    visibleW = vw;
    visibleH = vw / videoAR;
    offsetY = (vh - visibleH) / 2;
  }
  return { visibleW, visibleH, offsetX, offsetY };
}

// ─── DRAWING HELPERS ─────────────────────────────
const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [5,6],[6,7],[7,8],
  [9,10],[10,11],[11,12],
  [13,14],[14,15],[15,16],
  [17,18],[18,19],[19,20],
  [0,5],[5,9],[9,13],[13,17],[0,17]
];

function lm(landmarks, idx, vr) {
  const p = landmarks[idx];
  return {
    x: (1 - p.x) * vr.visibleW + vr.offsetX,
    y: p.y * vr.visibleH + vr.offsetY
  };
}

function drawHand(landmarks) {
  const vr = videoRect();
  // connections
  ctx.strokeStyle = 'rgba(251,191,36,0.35)';
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#fbbf24';
  for (const [a, b] of HAND_CONNECTIONS) {
    const pa = lm(landmarks, a, vr);
    const pb = lm(landmarks, b, vr);
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.stroke();
  }
  // dots
  for (let i = 0; i < landmarks.length; i++) {
    const p = lm(landmarks, i, vr);
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#fbbf24';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fbbf24';
    ctx.fill();
    // white center
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function drawFace(detections) {
  const vr = videoRect();
  for (const det of detections) {
    const bb = det.boundingBox;
    if (!bb) continue;
    const x  = (1 - bb.xCenter - bb.width / 2) * vr.visibleW + vr.offsetX;
    const y  = (bb.yCenter - bb.height / 2) * vr.visibleH + vr.offsetY;
    const w  = bb.width  * vr.visibleW;
    const h  = bb.height * vr.visibleH;
    const r  = 12;
    // outer glow
    ctx.shadowBlur = 18;
    ctx.shadowColor = '#a855f7';
    ctx.strokeStyle = '#a855f7';
    ctx.lineWidth = 2;
    roundRect(ctx, x, y, w, h, r);
    ctx.stroke();
    // inner ring
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(168,85,247,0.12)';
    ctx.lineWidth = 5;
    roundRect(ctx, x+2, y+2, w-4, h-4, r);
    ctx.stroke();
    // keypoints
    if (det.landmarks) {
      for (const kp of det.landmarks) {
        const kx = (1 - kp.x) * vr.visibleW + vr.offsetX;
        const ky = kp.y * vr.visibleH + vr.offsetY;
        ctx.beginPath();
        ctx.arc(kx, ky, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#a855f7';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(kx, ky, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = 'white';
        ctx.fill();
      }
    }
  }
  ctx.shadowBlur = 0;
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

// ─── GESTURE CLASSIFICATION ───────────────────────
const PEACE_HOLD = 2; // فوري — 2 فريم بس

function classifyGesture(lms) {
  const fingerTips  = [8, 12, 16, 20];
  const fingerMids  = [6, 10, 14, 18];

  const fingersUp = fingerTips.map((tip, i) => lms[tip].y < lms[fingerMids[i]].y);
  const thumbExtended = lms[4].y < lms[3].y; // رأس الإبهام فوق مفصل IP = الإبهام مرفوع

  const allFingersUp = fingersUp.every(Boolean);
  if (allFingersUp && thumbExtended) return 'open';

  const indexUp = fingersUp[0] && fingersUp[1];
  const ringDown = !fingersUp[2] && !fingersUp[3];
  if (indexUp && ringDown) return 'peace';

  const allDown = fingersUp.every(f => !f);
  if (allDown && thumbExtended) return 'thumbsup';
  if (allDown && !thumbExtended) return 'fist';

  return null;
}

// ─── STATUS ──────────────────────────────────────
function setStatus(text, isGesture = false) {
  statusText.textContent = text;
  statusDot.classList.toggle('gesture', isGesture);
}

// ─── PHOTO CAPTURE ───────────────────────────────
function capturePhoto() {
  if (isCapturing) return;
  isCapturing = true;

  // Flash
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 100);

  // Draw frame to offscreen canvas
  const fc = document.createElement('canvas');
  fc.width  = video.videoWidth  || 1280;
  fc.height = video.videoHeight || 720;
  const fx = fc.getContext('2d');
  fx.translate(fc.width, 0);
  fx.scale(-1, 1);
  fx.drawImage(video, 0, 0, fc.width, fc.height);

  const dataUrl = fc.toDataURL('image/jpeg', 0.92);
  photos.push(dataUrl);
  addThumbnail(dataUrl);
  updatePhotoCount();
  setStatus(`📸 صورة ${photos.length}`, false);

  setTimeout(() => { isCapturing = false; }, 800);
}

function addThumbnail(dataUrl) {
  const img = document.createElement('img');
  img.className = 'thumb';
  img.src = dataUrl;
  thumbsEl.appendChild(img);
  if (thumbsEl.children.length > 8) {
    thumbsEl.removeChild(thumbsEl.firstChild);
  }
}

function updatePhotoCount() {
  if (photos.length > 0) {
    photoCount.style.display = 'block';
    photoCount.textContent = `${photos.length} صورة`;
  }
}

// ─── COUNTDOWN ───────────────────────────────────
function startCountdown() {
  if (countdownInterval) return;
  countdownValue = 3;
  cdEl.textContent = countdownValue;
  cdEl.classList.add('visible');
  countdownInterval = setInterval(() => {
    countdownValue--;
    if (countdownValue <= 0) {
      clearInterval(countdownInterval);
      countdownInterval = null;
      cdEl.classList.remove('visible');
      capturePhoto();
    } else {
      cdEl.textContent = countdownValue;
    }
  }, 1000);
}

function cancelCountdown() {
  if (countdownInterval) {
    clearInterval(countdownInterval);
    countdownInterval = null;
    cdEl.classList.remove('visible');
  }
}

// ─── CLOUDINARY UPLOAD ──────────────────────────
async function uploadToCloudinary(dataUrl) {
  const fd = new FormData();
  fd.append('file', dataUrl);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method: 'POST', body: fd });
  const json = await res.json();
  if (json.public_id) return json.public_id;
  throw new Error('Cloudinary upload failed');
}

// ─── QR / UPLOAD ─────────────────────────────────
async function showQR() {
  if (photos.length === 0) {
    setStatus('لا توجد صور بعد', false);
    return;
  }
  qrCard.classList.add('visible');
  qrContainer.innerHTML = '<div id="qr-loading" style="color:rgba(255,255,255,0.5);font-size:13px;text-align:center;font-family:DM Sans,sans-serif;">جارٍ الرفع...</div>';

  try {
    const ids = [];
    for (const dataUrl of photos) {
      const id = await uploadToCloudinary(dataUrl);
      ids.push(id);
    }
    const galleryUrl = `${window.location.origin}${window.location.pathname}?p=${ids.join(',')}`;
    renderQR(galleryUrl);
  } catch (e) {
    console.error('Upload failed:', e);
    qrContainer.innerHTML = '<div style="color:rgba(255,255,255,0.6);font-size:14px;padding:20px;text-align:center;font-family:DM Sans,sans-serif;">⚠️ فشل رفع الصور<br><span style="font-size:12px;color:rgba(255,255,255,0.4);">تأكد من إعدادات Cloudinary</span></div>';
  }
}

function renderQR(url) {
  qrContainer.innerHTML = '';
  new QRCode(qrContainer, {
    text: url,
    width: 172,
    height: 172,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}

function closeQR() {
  qrCard.classList.remove('visible');
  qrVisible = false;
  gestureHoldCount = 0;
  lastGesture = null;
  setStatus('جاهز', false);
}

// ─── GESTURE HANDLER ─────────────────────────────
function handleGesture(gesture) {
  if (qrCard.classList.contains('visible')) return;

  if (gesture === lastGesture) {
    gestureHoldCount++;
  } else {
    gestureHoldCount = 1;
    lastGesture = gesture;
    if (gesture !== 'open') cancelCountdown();
  }

  if (!gesture) {
    setStatus('جاهز', false);
    gestureHoldCount = 0;
    return;
  }

  const threshold = gesture === 'peace' ? PEACE_HOLD : HOLD_THRESHOLD;
  const pct = Math.min(gestureHoldCount / threshold * 100, 100);

  if (gestureHoldCount >= threshold) {
    gestureHoldCount = 0;
    lastGesture = null;
    if (gesture === 'open') {
      setStatus('⏱ 3 ثوانٍ...', true);
      startCountdown();
    } else if (gesture === 'peace') {
      setStatus('📸 التقاط!', true);
      capturePhoto();
    } else if (gesture === 'fist') {
      cancelCountdown();
      setStatus('❌ إلغاء', false);
    } else if (gesture === 'thumbsup') {
      setStatus('⬆️ جارٍ الرفع...', true);
      showQR();
    }
  } else {
    const labels = { open: `🖐 ${Math.round(pct)}%`, peace: `✌️ ${Math.round(pct)}%`, fist: `👊 ${Math.round(pct)}%`, thumbsup: `👍 ${Math.round(pct)}%` };
    setStatus(labels[gesture] || 'جاهز', true);
  }
}

// ─── MEDIAPIPE HANDS ────────────────────────────
let faceDetector = null;
let lastFaceResults = [];

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

hands.onResults(results => {
  ctx.clearRect(0, 0, overlay.width, overlay.height);

  // Draw faces if available
  if (lastFaceResults.length > 0) drawFace(lastFaceResults);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const landmarks = results.multiHandLandmarks[0];
    drawHand(landmarks);
    const gesture = classifyGesture(landmarks);
    handleGesture(gesture);
  } else {
    if (!countdownInterval) {
      setStatus('جاهز', false);
    }
    gestureHoldCount = 0;
    lastGesture = null;
  }
});

// ─── FACE DETECTION ──────────────────────────────
function tryLoadFaceDetection() {
  if (typeof FaceDetection === 'undefined') return;
  faceDetector = new FaceDetection({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
  });
  faceDetector.setOptions({ model: 'short', minDetectionConfidence: 0.5 });
  faceDetector.onResults(res => {
    lastFaceResults = res.detections || [];
  });
}

// ─── CAMERA ──────────────────────────────────────
const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
    if (faceDetector) {
      try { await faceDetector.send({ image: video }); } catch(e) {}
    }
  },
  width: 1280,
  height: 720
});

camera.start().then(() => {
  setStatus('جاهز', false);
  tryLoadFaceDetection();
}).catch(err => {
  setStatus('⚠️ تعذّر الوصول للكاميرا', false);
  console.error(err);
});
</script>
