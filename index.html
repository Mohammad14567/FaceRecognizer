<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مطعم ومقهى موريا</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
    }
    #app { width: 100vw; height: 100vh; position: relative; }

    #cam-wrap {
      position: absolute; inset: 0;
      background: #000;
      overflow: hidden;
    }
    #cam-wrap video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #overlay {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 2;
    }
    #flash {
      position: absolute; inset: 0;
      background: #fff; opacity: 0;
      z-index: 10; pointer-events: none;
      transition: opacity 0.05s;
    }
    #countdown-badge {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 120px; color: #fff;
      text-shadow: 0 4px 24px rgba(0,0,0,0.7);
      z-index: 8; display: none;
      pointer-events: none; line-height: 1;
    }
    #status-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
      padding: 3rem 1.5rem 1.5rem; z-index: 5;
      pointer-events: none;
    }
    #status-text {
      font-size: 15px; color: #fff; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555; flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.ready  { background: #4ade80; }
    #status-dot.gesture { background: #f59e0b; animation: pulse-dot 0.6s infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

    #cam-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; z-index: 1;
    }
    #cam-placeholder svg { opacity: 0.3; }
    #cam-placeholder p { font-size: 14px; color: #666; }

    #no-mediapipe {
      display: none;
      margin-top: 1rem;
      padding: 1rem;
      background: #1e1a0e;
      border: 1px solid #78350f;
      border-radius: 8px;
      color: #fbbf24;
      font-size: 13px;
    }

    #photo-result {
      display: none;
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%);
      gap: 10px; z-index: 20;
      direction: ltr;
    }
    #photo-result.show { display: flex; }
    .photo-item {
      width: 60px; height: 60px;
      border-radius: 10px; overflow: hidden;
      border: 2px solid rgba(255,255,255,0.3);
      flex-shrink: 0;
    }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* === Gesture Guide (top-middle) === */
    #gesture-guide {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 20;
      background: rgba(10,10,10,0.92);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 10px 14px;
      display: flex; flex-direction: row; gap: 8px;
      width: auto; max-width: 94vw;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .g-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1), background 0.6s, border-color 0.6s, box-shadow 0.6s;
      transform: scale(0.92);
    }
    .g-item:hover { background: rgba(255,255,255,0.12); }
    .g-item.focused {
      transform: scale(1.08);
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 0 20px rgba(255,255,255,0.06);
    }
    .g-item .g-icon { font-size: 26px; flex-shrink: 0; transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1); }
    .g-item.focused .g-icon { transform: scale(1.15); }
    .g-item .g-label { display: flex; flex-direction: column; }
    .g-item .g-name { font-size: 13px; font-weight: 600; color: #f0f0f0; white-space: nowrap; }
    .g-item .g-desc { font-size: 10px; color: #aaa; white-space: nowrap; }
    @media (max-width: 767px) {
      #gesture-guide { top: 14px; gap: 5px; padding: 8px 10px; }
      .g-item { gap: 5px; padding: 5px 8px; }
      .g-item .g-icon { font-size: 18px; }
      .g-item .g-name { font-size: 10px; }
      .g-item .g-desc { font-size: 8px; }
      #status-bar { padding: 2rem 1rem 1rem; }
      #status-text { font-size: 13px; }
      #photo-result { bottom: 60px; }
      .photo-item { width: 48px; height: 48px; }
      #countdown-badge { font-size: 80px; }
    }
    @media (min-width: 768px) and (max-width: 1024px) {
      #countdown-badge { font-size: 140px; }
    }
    @media (orientation: landscape) and (max-height: 500px) {
      #gesture-guide { top: 8px; gap: 4px; padding: 6px 8px; }
      .g-item { padding: 4px 6px; gap: 4px; }
      .g-item .g-icon { font-size: 14px; }
      .g-item .g-name { font-size: 9px; }
      .g-item .g-desc { font-size: 8px; }
      #photo-result { bottom: 50px; }
    }

    /* === QR Card === */
    #qr-card {
      display: none; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20,20,20,0.92);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: 20px; padding: 1.5rem;
      width: calc(100% - 2rem); max-width: 360px;
      z-index: 100; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    #qr-card.show { display: block; }
    #qr-card h2 { font-size: 18px; font-weight: 500; color: #eee; margin-bottom: 0.3rem; }
    #qr-card p { font-size: 13px; color: #888; margin-bottom: 1rem; }
    #qr-code-wrap { display: flex; justify-content: center; margin-bottom: 1rem; }
    #qr-code-wrap img, #qr-code-wrap canvas {
      border-radius: 12px; border: 2px solid #2a2a2a;
    }
    #qr-card .photo-count { font-size: 11px; color: #555; margin-bottom: 0.25rem; }
    #btn-close-qr {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      padding: 10px 20px;
      border-radius: 8px; border: 1px solid #555;
      background: transparent; color: #aaa;
      cursor: pointer;
      width: 100%;
    }
    #btn-close-qr:hover { background: rgba(255,255,255,0.05); }

  </style>
</head>
<body>
<div id="app">

  <div id="cam-wrap">
    <div id="cam-placeholder">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <p>Requesting camera access...</p>
    </div>
    <video id="video" autoplay muted playsinline webkit-playsinline x-webkit-airplay="allow" disablePictureInPicture></video>
    <canvas id="overlay"></canvas>
    <div id="flash"></div>
    <div id="countdown-badge" aria-live="assertive"></div>
    <div id="status-bar">
      <div id="status-text">
        <div id="status-dot"></div>
        <span id="status-msg">Camera off</span>
      </div>
    </div>
  </div>

  <div id="gesture-guide">
    <div class="g-item">
      <span class="g-icon">🖐</span>
      <div class="g-label"><span class="g-name">كف مفتوح</span><span class="g-desc">عد ٣ ثواني → تصوير</span></div>
    </div>
    <div class="g-item">
      <span class="g-icon">✌️</span>
      <div class="g-label"><span class="g-name">سلام</span><span class="g-desc">تصوير فوري</span></div>
    </div>
    <div class="g-item">
      <span class="g-icon">👊</span>
      <div class="g-label"><span class="g-name">قبضة</span><span class="g-desc">إلغاء</span></div>
    </div>
    <div class="g-item">
      <span class="g-icon">👍</span>
      <div class="g-label"><span class="g-name">إبهام للأعلى</span><span class="g-desc">إنشاء QR لتحميل الصور</span></div>
    </div>
  </div>

  <div id="photo-result"></div>

  <div id="no-mediapipe">
    MediaPipe failed to load. Please check your internet connection and reload the page.
  </div>

  <div id="qr-card">
    <h2>📸 مسح QR لتحميل الصور</h2>
    <p>امسح QR بهاتفك — افتح كل صورة واضغط زر التحميل</p>
    <div id="qr-code-wrap"></div>
    <div class="photo-count" id="qr-photo-count"></div>
    <button id="btn-close-qr" onclick="closeQRModal()">إغلاق</button>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-5niY7cY6Dw/F7eYc2dcFqd8WDuhQXmBwY8IsYOdgIF7V/P/Y0b+1lzqIYaErwLxaG6xE1BF96vy66pSl7r5LJQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
const video      = document.getElementById('video');
const overlay    = document.getElementById('overlay');
const flash      = document.getElementById('flash');
const cdBadge    = document.getElementById('countdown-badge');
const statusDot  = document.getElementById('status-dot');
const statusMsg  = document.getElementById('status-msg');
const photoResult = document.getElementById('photo-result');
const placeholder = document.getElementById('cam-placeholder');

let ctx, handsModel, faceModel, mpCam;
let faceDetections = [];
let focusIdx = 0;
let focusTimer = null;
let countingDown = false, snapped = false;
let gestureHoldFrames = 0;
const HOLD_FRAMES = 18;
let lastGesture = null;
const photos = [];



function setStatus(msg, state) {
  statusMsg.textContent = msg;
  statusDot.className = '';
  if (state) statusDot.classList.add(state);
}

function classifyGesture(lm) {
  if (!lm || lm.length < 21) return 'none';
  const tips = [4, 8, 12, 16, 20];
  const mids = [3, 6, 10, 14, 18];
  const extended = tips.map((t, i) => {
    if (i === 0) return lm[t].x < lm[mids[i]].x;
    return lm[t].y < lm[mids[i]].y;
  });
  const fingerCount = extended.slice(1).filter(Boolean).length;
  const thumbOut = extended[0];
  if (fingerCount === 4 && thumbOut) return 'open';
  if (fingerCount === 2 && extended[1] && extended[2] && !extended[3] && !extended[4]) return 'peace';
  if (thumbOut && fingerCount === 0) return 'thumbsup';
  if (fingerCount === 0) return 'fist';
  return 'none';
}

function videoRect() {
  const vw = video.videoWidth, vh = video.videoHeight;
  const cw = overlay.width, ch = overlay.height;
  const vA = vw / vh, cA = cw / ch;
  let dw, dh, dx, dy;
  if (vA > cA) { dh = ch; dw = dh * vA; dx = (cw - dw) / 2; dy = 0; }
  else { dw = cw; dh = dw / vA; dx = 0; dy = (ch - dh) / 2; }
  return { x: dx, y: dy, w: dw, h: dh };
}

function focusItem(idx) {
  const items = document.querySelectorAll('.g-item');
  items.forEach((el, i) => el.classList.toggle('focused', i === idx));
  focusIdx = idx;
}

function startFocusCycle() {
  stopFocusCycle();
  focusItem(0);
  focusTimer = setInterval(() => focusItem((focusIdx + 1) % document.querySelectorAll('.g-item').length), 4000);
}

function stopFocusCycle() {
  if (focusTimer) { clearInterval(focusTimer); focusTimer = null; }
}

function drawLandmarks(lm) {
  if (!ctx || !lm) return;
  const v = videoRect();
  const connections = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [5,9],[9,10],[10,11],[11,12],
    [9,13],[13,14],[14,15],[15,16],
    [13,17],[17,18],[18,19],[19,20],[0,17]
  ];
  
  ctx.save();
  ctx.shadowColor = 'rgba(245,158,11,0.3)';
  ctx.shadowBlur = 8;
  ctx.strokeStyle = 'rgba(245,158,11,0.35)';
  ctx.lineWidth = 1.5;
  for (const [a, b] of connections) {
    ctx.beginPath();
    ctx.moveTo((1 - lm[a].x) * v.w + v.x, lm[a].y * v.h + v.y);
    ctx.lineTo((1 - lm[b].x) * v.w + v.x, lm[b].y * v.h + v.y);
    ctx.stroke();
  }
  ctx.restore();

  ctx.shadowColor = 'rgba(245,158,11,0.6)';
  ctx.shadowBlur = 12;
  for (const p of lm) {
    ctx.beginPath();
    ctx.arc((1 - p.x) * v.w + v.x, p.y * v.h + v.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fbbf24';
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  for (const p of lm) {
    ctx.beginPath();
    ctx.arc((1 - p.x) * v.w + v.x, p.y * v.h + v.y, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  if (typeof ctx.roundRect === 'function') { ctx.roundRect(x, y, w, h, r); return; }
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
}

function drawFaces(detections) {
  if (!ctx || !detections) return;
  const v = videoRect();
  for (const d of detections) {
    const box = d.boundingBox;
    const x = (1 - box.xMin - box.width) * v.w + v.x;
    const y = box.yMin * v.h + v.y;
    const bw = box.width * v.w;
    const bh = box.height * v.h;
    ctx.save();
    ctx.shadowColor = 'rgba(139,92,246,0.3)';
    ctx.shadowBlur = 18;
    ctx.strokeStyle = 'rgba(139,92,246,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    roundRect(ctx, x - 4, y - 4, bw + 8, bh + 8, 12);
    ctx.stroke();
    ctx.restore();
    ctx.save();
    ctx.shadowColor = 'rgba(139,92,246,0.1)';
    ctx.shadowBlur = 24;
    ctx.strokeStyle = 'rgba(139,92,246,0.12)';
    ctx.lineWidth = 5;
    ctx.beginPath();
    roundRect(ctx, x - 4, y - 4, bw + 8, bh + 8, 12);
    ctx.stroke();
    ctx.restore();

    if (d.landmarks) {
      for (const lp of d.landmarks) {
        const px = (1 - lp.x) * v.w + v.x, py = lp.y * v.h + v.y;
        ctx.save();
        ctx.shadowColor = 'rgba(139,92,246,0.5)';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(px, py, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = '#a78bfa';
        ctx.fill();
        ctx.restore();
        ctx.beginPath();
        ctx.arc(px, py, 1.2, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      }
    }
  }
}

function triggerCountdown(seconds, onDone) {
  if (countingDown) return;
  countingDown = true;
  cdBadge.style.display = 'block';
  let s = seconds;
  const tick = () => {
    if (s <= 0) {
      cdBadge.style.display = 'none';
      countingDown = false;
      onDone();
      return;
    }
    cdBadge.textContent = s;
    s--;
    setTimeout(tick, 900);
  };
  tick();
}

function capturePhoto() {
  snapped = true;
  flash.style.opacity = 1;
  setTimeout(() => { flash.style.opacity = 0; }, 140);

  const snap = document.createElement('canvas');
  snap.width  = video.videoWidth  || 1280;
  snap.height = video.videoHeight || 720;
  const sc = snap.getContext('2d');
  sc.save();
  sc.translate(snap.width, 0);
  sc.scale(-1, 1);
  sc.drawImage(video, 0, 0);
  sc.restore();

  const dataURL = snap.toDataURL('image/jpeg', 0.95);
  photos.push(dataURL);

  const item = document.createElement('div');
  item.className = 'photo-item';
  const img = document.createElement('img');
  img.src = dataURL;
  img.alt = 'صورة ' + photos.length;
  item.appendChild(img);
  photoResult.appendChild(item);
  photoResult.classList.add('show');

  setStatus('تم حفظ الصورة! (' + photos.length + ' إجمالي)', 'ready');
  if (ctx) ctx.clearRect(0, 0, overlay.width, overlay.height);
  setTimeout(() => { snapped = false; }, 800);
}

function clearPhotos() {
  photos.length = 0;
  photoResult.innerHTML = '';
  photoResult.classList.remove('show');
  setStatus('تم مسح كل الصور', 'ready');
}

function restartApp() {
  clearPhotos();
  countingDown = false;
  snapped = false;
  gestureHoldFrames = 0;
  lastGesture = null;
  cdBadge.style.display = 'none';
  if (ctx) ctx.clearRect(0, 0, overlay.width, overlay.height);
  setStatus('تم إعادة التعيين!', 'ready');
}

function closeQRModal() {
  document.getElementById('qr-card').classList.remove('show');
}



function dataURLtoBlob(d) {
  const p = d.split(','), m = p[0].match(/:(.*?);/)[1], b = atob(p[1]);
  const a = new Uint8Array(b.length);
  for (let i = 0; i < b.length; i++) a[i] = b.charCodeAt(i);
  return new Blob([a], { type: m });
}

function fetchWithTimeout(url, opt, ms) {
  const c = new AbortController();
  const id = setTimeout(() => c.abort(), ms || 8000);
  return fetch(url, { ...opt, signal: c.signal }).then(r => { clearTimeout(id); return r; }).catch(e => { clearTimeout(id); throw e; });
}

async function uploadFile(dataUrl) {
  const fd = new FormData();
  fd.append('file', dataURLtoBlob(dataUrl), 'p.jpg');
  const r = await fetchWithTimeout('https://telegra.ph/upload', { method: 'POST', body: fd });
  const d = await r.json();
  if (!d || !d[0] || !d[0].src) throw new Error('فشل رفع الصورة');
  return 'https://telegra.ph' + d[0].src;
}

function fallbackDownload() {
  setStatus('⬇ جاري تحميل الصور...', 'gesture');
  photos.forEach((dataUrl, i) => {
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = 'moria_' + (i + 1) + '.jpg';
    a.click();
  });
  setTimeout(() => setStatus('✅ تم التحميل! ارفع إبهامك لل QR', 'ready'), 1000);
}

async function generateQRCode() {
  if (photos.length === 0) {
    setStatus('⚠️ التقط الصور أولاً', 'ready');
    return;
  }
  
  if (typeof QRCode === 'undefined') {
    setStatus('❌ مكتبة QR لم يتم تحميلها، أعد تحميل الصفحة', 'ready');
    return;
  }
  
  setStatus('📸 جاري رفع الصور...', 'gesture');
  
  try {
    const urls = [];
    for (let i = 0; i < photos.length; i++) {
      setStatus('📸 رفع الصورة ' + (i + 1) + '/' + photos.length + '...', 'gesture');
      const u = await uploadFile(photos[i]);
      urls.push(u);
    }
    
    let token = localStorage.getItem('tg_token');
    if (!token) {
      const a = await (await fetchWithTimeout('https://api.telegra.ph/createAccount', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ short_name: 'Moria', author_name: 'مطعم ومقهى موريا' })
      })).json();
      if (a.ok) { token = a.result.access_token; localStorage.setItem('tg_token', token); }
    }
    
    let pageUrl;
    if (token) {
      const p = await (await fetchWithTimeout('https://api.telegra.ph/createPage', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          access_token: token, title: 'صور من مطعم ومقهى موريا',
          author_name: 'مطعم ومقهى موريا',
          content: [ ...urls.flatMap(u => [
            { tag: 'img', attrs: { src: u } },
            { tag: 'p', children: [{ tag: 'a', attrs: { href: u }, children: ['⬇ تحميل الصورة'] }] }
          ]), { tag: 'p', children: ['📸 مطعم ومقهى موريا - افتح كل صورة واضغط على رابط التحميل أسفلها'] } ]
        })
      })).json();
      if (p.ok) pageUrl = 'https://telegra.ph/' + p.result.path;
    }
    
    showQRCard(pageUrl || urls.join('\n'), urls.length);
  } catch (e) {
    setStatus('❌ تعذر رفع الصور — سيتم تحميلها مباشرة', 'ready');
    setTimeout(fallbackDownload, 800);
  }
}

function showQRCard(text, count) {
  const wrap = document.getElementById('qr-code-wrap');
  wrap.innerHTML = '';
  new QRCode(wrap, {
    text: text, width: 200, height: 200,
    colorDark: '#ffffff', colorLight: '#141414',
    correctLevel: QRCode.CorrectLevel.M
  });
  document.getElementById('qr-photo-count').textContent = count + ' صورة — امسح QR بهاتفك';
  document.getElementById('qr-card').classList.add('show');
  setStatus('✅ QR جاهز! امسحه لفتح المعرض', 'ready');
}

function onFaceResults(results) {
  faceDetections = results.detections || [];
}

function onResults(results) {
  if (snapped || countingDown) return;
  overlay.width  = overlay.clientWidth  || 640;
  overlay.height = overlay.clientHeight || 360;
  if (ctx) ctx.clearRect(0, 0, overlay.width, overlay.height);
  if (faceDetections.length > 0) drawFaces(faceDetections);
  const lm = results.multiHandLandmarks?.[0];
  if (lm) {
    drawLandmarks(lm);
    const g = classifyGesture(lm);
    if (g !== 'none') {
      if (g === lastGesture) gestureHoldFrames++;
      else { gestureHoldFrames = 0; lastGesture = g; }
      if (gestureHoldFrames >= HOLD_FRAMES) {
        gestureHoldFrames = 0;
        if (g === 'open') {
          setStatus('🖐 كف مفتوح! بدء العد التنازلي...', 'gesture');
          triggerCountdown(3, capturePhoto);
        } else if (g === 'peace') {
          setStatus('✌️ سلام! تصوير الآن...', 'gesture');
          capturePhoto();
        } else if (g === 'fist') {
          setStatus('اعرض إيماءة لالتقاط صورة', 'ready');
        } else if (g === 'thumbsup') {
          setStatus('👍 إنشاء رمز QR...', 'gesture');
          generateQRCode();
        }
      } else {
        const names = {
          open: '🖐 أمسك الكف ثابتاً...',
          peace: '✌️ أمسك السلام ثابتاً...',
          fist: '👊 قبضة — إلغاء',
          thumbsup: '👍 أمسك الإبهام ثابتاً...'
        };
        setStatus(names[g] || 'تم اكتشاف إيماءة...', 'gesture');
      }
    } else {
      lastGesture = null;
      gestureHoldFrames = 0;
      setStatus('اعرض إيماءة لالتقاط صورة', 'ready');
    }
  } else {
    lastGesture = null;
    gestureHoldFrames = 0;
    setStatus('لم يتم اكتشاف يد — اعرض يدك للكاميرا', 'ready');
  }
}

async function startCam() {
  setStatus('جارٍ تشغيل الكاميرا...', '');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    video.play();
    placeholder.style.display = 'none';
    ctx = overlay.getContext('2d');

    if (typeof Hands === 'undefined') {
      document.getElementById('no-mediapipe').style.display = '';
      return;
    }

    handsModel = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    handsModel.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.6
    });
    handsModel.onResults(onResults);

    if (typeof FaceDetection !== 'undefined') {
      faceModel = new FaceDetection({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${f}`
      });
      faceModel.setOptions({
        modelSelection: 0,
        minDetectionConfidence: 0.5
      });
      faceModel.onResults(onFaceResults);
    }

    mpCam = new Camera(video, {
      onFrame: async () => {
        const tasks = [handsModel.send({ image: video })];
        if (faceModel) tasks.push(faceModel.send({ image: video }));
        await Promise.all(tasks);
      },
      width: 1280,
      height: 720
    });
    mpCam.start();

    setStatus('اعرض إيماءة لالتقاط صورة', 'ready');
  } catch (e) {
    setStatus('تم رفض الوصول إلى الكاميرا أو أنها غير متوفرة', '');
  }
}

window.addEventListener('load', () => {
  startCam();
  startFocusCycle();
});

</script>
